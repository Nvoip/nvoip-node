name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node --check src/client.js
      - run: for file in examples/*.js; do node --check "$file"; done
      - run: npm pack --dry-run
